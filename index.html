<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporting activités commerciales — LENI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    /* Design System Community — semantic tokens */
    --navy:#131927; --navy-light:#394050; --blue-accent:#002562; --blue-soft:#eef3fa;
    --bg:#f9fafb; --card:#ffffff; --border:#e5e7ea; --text:#131927; --text-muted:#6d717f;
    --red:#ee443f; --red-soft:#fdecec; --green:#43b75d; --green-soft:#ecf8ef;
    --gold:#e8a200; --gold-soft:#fff7e6;
    --radius-sm:8px; --radius-md:12px; --radius-lg:16px;
    --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px; --space-5:20px; --space-6:24px;
    --shadow-card:0 4px 16px rgba(19,25,39,.07);
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter','Segoe UI',-apple-system,BlinkMacSystemFont,Arial,sans-serif;background:var(--bg);color:var(--text);}
  .app-layout{display:grid;grid-template-columns:238px minmax(0,1fr);min-height:100vh;}
  .sidebar{position:sticky;top:0;height:100vh;background:#fff;border-right:1px solid var(--border);padding:20px 16px;z-index:30;overflow-y:auto;}
  .sidebar-brand{display:flex;align-items:center;gap:10px;padding:2px 8px 20px;margin-bottom:20px;border-bottom:1px solid #eef1f5;}
  .sidebar-logo{display:block;width:195px;height:76px;object-fit:contain;object-position:left center;}
  .brand-mark{width:36px;height:36px;border-radius:var(--radius-sm);background:var(--blue-accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;letter-spacing:-.3px;}
  .brand{display:flex;align-items:baseline;gap:6px;font-weight:600;font-size:16px;}
  .brand .sub{font-size:10px;color:var(--text-muted);font-weight:600;letter-spacing:1px;}
  .sidebar-label{padding:0 10px 8px;color:#98a2b3;font-size:9px;font-weight:800;letter-spacing:1.1px;text-transform:uppercase;}
  .container{width:100%;max-width:1680px;margin:0 auto;padding:28px 28px 54px;min-width:0;}
  h1{font-size:24px;line-height:28px;margin:0;font-weight:600;letter-spacing:0;}
  .dashboard-header{display:flex;align-items:center;justify-content:space-between;gap:20px;margin-bottom:22px;}
  .dashboard-date{font-size:12px;font-weight:700;color:var(--blue-accent);background:var(--blue-soft);border-radius:999px;padding:7px 12px;white-space:nowrap;}
  .lede{color:var(--text-muted);font-size:12px;margin:0 0 22px;}
  .tabs{display:flex;flex-direction:column;gap:5px;}
  .tab{width:100%;display:flex;align-items:center;gap:12px;border:none;background:transparent;padding:12px;border-radius:var(--radius-sm);font-family:inherit;font-size:14px;line-height:16px;font-weight:500;color:var(--navy-light);cursor:pointer;text-align:left;transition:background .14s,color .14s,transform .14s;}
  .tab:hover{background:var(--blue-soft);color:var(--blue-accent);transform:translateX(2px);}
  .tab.active{background:var(--blue-accent);color:#fff;box-shadow:none;}
  .nav-icon{width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;flex:0 0 18px;}
  .nav-icon svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
  .tab-label{min-width:0;}
  .view{display:none;} .view.active{display:block;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:20px;margin-bottom:16px;box-shadow:var(--shadow-card);}
  .card h2{font-size:18px;line-height:28px;margin:0 0 4px;font-weight:600;}
  .card .subtitle{font-size:12px;color:var(--text-muted);margin-bottom:16px;}
  select,input[type=search]{min-height:40px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;font-family:inherit;font-size:14px;line-height:20px;background:#fff;color:var(--text);width:100%;outline:none;}
  select:hover,input[type=search]:hover{border-color:#9ea2ae;}
  select:focus,input[type=search]:focus{border-color:var(--blue-accent);box-shadow:0 0 0 3px rgba(0,37,98,.16);}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  .invoice-table{min-width:1420px;}
  th{text-align:left;color:var(--text-muted);font-size:10px;letter-spacing:.25px;text-transform:none;font-weight:600;padding:10px 11px;border-bottom:1px solid var(--border);background:#f9fafb;}
  th.num,td.num{text-align:right;}
  td{padding:11px;border-bottom:1px solid var(--border);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  ::-webkit-scrollbar{width:8px;} ::-webkit-scrollbar-thumb{background:#d7dbe6;border-radius:8px;}
  .note{font-size:11px;color:var(--text-muted);background:#fbf1dc;border-radius:8px;padding:8px 12px;margin-bottom:16px;}
  .footnote{font-size:11px;color:var(--text-muted);margin-top:20px;}

  /* ---------- Master / detail pattern ---------- */
  .master-detail{display:flex;gap:18px;align-items:flex-start;}
  .md-sidebar{width:300px;flex-shrink:0;background:#fff;border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;box-shadow:var(--shadow-card);}
  #view-top-affaires .md-sidebar,
  #view-baisses .md-sidebar,
  #view-detail-affaires .md-sidebar{width:calc(40% - 9px);flex:0 0 calc(40% - 9px);}
  .md-sidebar-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .md-sidebar-head h3{font-size:16px;line-height:24px;margin:0;font-weight:600;}
  .md-count{font-size:11px;background:#eef1f7;color:var(--text-muted);padding:3px 9px;border-radius:999px;font-weight:700;}
  .md-search{margin-bottom:10px;}
  .md-filters{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
  .md-list{max-height:560px;overflow-y:auto;}
  .md-list.no-scroll-list{max-height:none;overflow:visible;}
  .md-item{display:flex;justify-content:space-between;align-items:center;gap:8px;min-height:48px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:4px;transition:background .12s,box-shadow .12s;}
  .md-item:hover{background:var(--blue-soft);}
  .md-item.active{background:var(--blue-accent);}
  .md-item .name{font-weight:500;font-size:14px;line-height:20px;color:var(--text);}
  .md-item.active .name{color:#fff;}
  .md-item .meta{font-size:11px;color:var(--text-muted);margin-top:2px;}
  .md-item.active .meta{color:#aebbdd;}
  .md-detail{flex:1;min-width:0;}
  .compare-sidebar{width:470px;}
  .compare-item{display:block;padding:11px 12px;}
  .compare-item-top{display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .compare-item-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:8px;}
  .compare-metric{min-width:0;}
  .compare-metric .m-label{display:block;font-size:9px;text-transform:uppercase;letter-spacing:.35px;color:var(--text-muted);font-weight:700;}
  .compare-metric .m-value{display:block;font-size:11px;font-weight:800;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .compare-item.active .compare-metric .m-label{color:#aebbdd;}
  .compare-item.active .compare-metric .m-value{color:#fff;}
  .compare-item.active .compare-metric .m-value.pos{color:#a9f0cf;}
  .compare-item.active .compare-metric .m-value.neg{color:#ffb9c5;}
  .empty-state{padding:28px 12px;text-align:center;color:var(--text-muted);font-size:12px;}

  /* ---------- Performance clients ---------- */
  .pc-card{padding:16px;border:1px solid var(--border);border-radius:var(--radius-md);margin-bottom:8px;background:#fff;transition:border-color .15s,box-shadow .15s,background .15s;}
  .pc-card:hover{border-color:#cbd8ee;box-shadow:0 5px 16px rgba(15,31,61,.07);}
  .pc-card.active{background:var(--blue-accent);border-color:var(--blue-accent);box-shadow:0 8px 20px rgba(0,37,98,.20);}
  .pc-card-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px;}
  .pc-client-name{border:0;background:transparent;padding:0;color:var(--text);font:inherit;font-size:14px;line-height:20px;font-weight:600;text-align:left;cursor:pointer;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .pc-card.active .pc-client-name{color:#fff;}
  .pc-card-grid{display:grid;grid-template-columns:1fr 1fr .9fr .75fr;gap:7px;align-items:stretch;}
  .pc-ca-button{border:1px solid var(--border);background:#f7f9fc;border-radius:9px;padding:8px 9px;text-align:left;cursor:pointer;color:var(--text);font-family:inherit;transition:transform .12s,border-color .12s,background .12s;min-width:0;}
  .pc-ca-button:hover{border-color:var(--blue-accent);background:var(--blue-soft);transform:translateY(-1px);}
  .pc-ca-button:focus-visible{outline:3px solid rgba(0,37,98,.25);outline-offset:1px;}
  .pc-ca-button .m-label,.pc-static-metric .m-label{display:block;font-size:9px;text-transform:uppercase;letter-spacing:.35px;color:var(--text-muted);font-weight:700;}
  .pc-ca-button .m-value,.pc-static-metric .m-value{display:block;font-size:11px;font-weight:800;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pc-ca-button .m-action{display:block;font-size:9px;color:var(--blue-accent);font-weight:700;margin-top:4px;}
  .pc-static-metric{padding:8px 5px;min-width:0;}
  .pc-card.active .pc-ca-button{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.16);color:#fff;}
  .pc-card.active .pc-ca-button .m-label,.pc-card.active .pc-static-metric .m-label{color:#aebbdd;}
  .pc-card.active .pc-ca-button .m-action{color:#9cc1ff;}
  .pc-card.active .pc-ca-button.is-selected{background:#fff;color:var(--navy);border-color:#fff;box-shadow:0 3px 9px rgba(0,0,0,.15);}
  .pc-card.active .pc-ca-button.is-selected .m-label{color:var(--text-muted);}
  .pc-card.active .pc-static-metric .m-value{color:#fff;}
  .pc-card.active .pc-static-metric .m-value.neg{color:#ff9aac;}
  .pc-card.active .pc-static-metric .m-value.pos{color:#8ee0b9;}
  .pc-list-panel{width:100%;padding:16px;}
  .pc-list-panel .md-list{max-height:none;overflow:visible;}
  .pc-list-panel .pc-card{width:100%;}
  .pc-list-title{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:14px;flex-wrap:wrap;}
  .pc-list-title h2{font-size:18px;margin:0 0 4px;font-weight:800;}
  .pc-list-title p{font-size:12px;color:var(--text-muted);margin:0;}
  .pc-toolbar{display:grid;grid-template-columns:minmax(260px,1fr) 220px;gap:10px;margin-bottom:12px;}
  .pc-table-wrap{border:1px solid var(--border);border-radius:var(--radius-md);overflow:auto;background:#fff;box-shadow:var(--shadow-card);}
  .pc-table{min-width:850px;}
  .pc-table tbody tr:hover{background:#f7f9fd;}
  .pc-table .client-cell{font-weight:700;color:var(--text);}
  .pc-client-meta{display:flex;align-items:center;gap:8px;min-width:0;}
  .pc-ca-link{border:0;background:transparent;padding:0;color:var(--text);font-family:inherit;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;}
  .pc-ca-link:hover{color:var(--blue-accent);text-decoration:underline;text-underline-offset:3px;}
  .pc-ca-link:focus-visible{outline:2px solid var(--blue-accent);outline-offset:3px;border-radius:2px;}
  .sortable-header{display:inline-flex;align-items:center;gap:5px;border:0;background:transparent;padding:0;color:inherit;font:inherit;font-weight:700;cursor:pointer;white-space:nowrap;}
  th.num .sortable-header{justify-content:flex-end;width:100%;}
  .sort-icon{font-size:9px;color:#b5bcc8;line-height:1;}
  .sortable-header.active{color:var(--blue-accent);}
  .sortable-header.active .sort-icon{color:var(--blue-accent);}
  .pc-back-button{display:inline-flex;align-items:center;gap:8px;min-height:40px;border:1px solid var(--blue-accent);background:#fff;border-radius:var(--radius-sm);padding:9px 14px;font-family:inherit;font-size:14px;line-height:16px;font-weight:600;color:var(--blue-accent);cursor:pointer;margin-bottom:20px;}
  .pc-back-button:hover{border-color:var(--blue-accent);color:var(--blue-accent);background:#f7faff;}
  .pc-period-switch{display:flex;gap:7px;flex-wrap:wrap;}
  .da-period-switch{margin-bottom:12px;}
  .da-period-switch .pc-period-button{flex:1;}
  .pc-period-button{min-height:40px;border:1px solid var(--border);background:#fff;border-radius:var(--radius-sm);padding:8px 14px;font-family:inherit;font-size:12px;font-weight:600;color:var(--navy);cursor:pointer;}
  .pc-period-button.active{background:var(--blue-accent);border-color:var(--blue-accent);color:#fff;}
  .kpi-card2.selected-period{border:2px solid var(--blue-accent);box-shadow:0 5px 14px rgba(0,37,98,.10);}

  .tag{font-size:10px;line-height:14px;font-weight:600;padding:4px 8px;border-radius:999px;white-space:nowrap;}
  .tag.up{background:var(--green-soft);color:var(--green);}
  .tag.down{background:var(--red-soft);color:var(--red);}
  .tag.new{background:var(--blue-soft);color:var(--navy);}
  .tag.neutral{background:#eef1f7;color:var(--text-muted);}
  .md-item.active .tag.neutral{background:rgba(255,255,255,.15);color:#fff;}
  .md-item.active .tag.up{background:rgba(31,157,110,.25);color:#a9f0cf;}
  .md-item.active .tag.down{background:rgba(220,61,90,.25);color:#ffb9c5;}

  .detail-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap;}
  .avatar-circle{width:48px;height:48px;border-radius:var(--radius-md);background:var(--blue-accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px;flex-shrink:0;}
  .avatar-circle.round{border-radius:50%;}
  .detail-title-wrap{flex:1;min-width:180px;}
  .detail-title{font-size:24px;font-weight:600;line-height:28px;}
  .detail-sub{font-size:13px;color:var(--text-muted);margin-top:2px;}

  .kpi-cards-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
  .kpi-card2{background:#fff;border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;box-shadow:var(--shadow-card);}
  .kpi-card2 .lbl{font-size:11px;color:var(--text-muted);font-weight:700;text-transform:uppercase;}
  .kpi-card2 .val{font-size:18px;line-height:28px;font-weight:600;margin-top:6px;}
  .kpi-card2 .val.pos{color:var(--green);} .kpi-card2 .val.neg{color:var(--red);}
  .kpi-card2 .delta-pct{display:block;font-size:12px;line-height:18px;font-weight:700;margin-top:2px;}
  .kpi-card2 .delta-pct.pos{color:var(--green);} .kpi-card2 .delta-pct.neg{color:var(--red);}
  .top-share-list{display:grid;grid-template-columns:repeat(var(--share-count,3),minmax(150px,1fr));padding:4px 0 0;}
  .top-share-card{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:150px;padding:12px 24px;text-align:center;animation:view-enter .42s cubic-bezier(.2,.8,.2,1) var(--share-delay,0ms) both;}
  .top-share-card+.top-share-card{border-left:1px solid var(--border);}
  .top-share-icon{display:flex;align-items:center;justify-content:center;width:50px;height:50px;margin-bottom:8px;border-radius:50%;background:color-mix(in srgb,var(--share-color) 14%,white);color:var(--share-color);}
  .top-share-icon svg{width:27px;height:27px;fill:currentColor;}
  .top-share-name{max-width:100%;font-size:13px;line-height:18px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .top-share-value{margin-top:5px;color:var(--share-color);font-size:21px;line-height:28px;font-weight:800;white-space:nowrap;}
  .top-share-pct{display:inline-flex;align-items:center;justify-content:center;min-width:76px;margin-top:6px;padding:5px 12px;border-radius:999px;background:color-mix(in srgb,var(--share-color) 13%,white);color:var(--share-color);font-size:12px;line-height:16px;font-weight:800;white-space:nowrap;}

  .panel{background:#fff;border:1px solid var(--border);border-radius:var(--radius-md);padding:20px;margin-bottom:16px;overflow-x:auto;box-shadow:var(--shadow-card);}
  .subtitle{font-size:12px;color:var(--text-muted);margin-bottom:12px;}
  .panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
  .panel-head h3{font-size:16px;line-height:24px;margin:0;font-weight:600;}
  .pill-toggle{display:flex;background:var(--blue-soft);border-radius:999px;padding:3px;gap:2px;}
  .pill-toggle button{border:none;background:transparent;padding:6px 14px;border-radius:999px;font-size:12px;font-weight:700;color:var(--navy);cursor:pointer;}
  .pill-toggle button.active{background:#fff;box-shadow:0 1px 3px rgba(15,31,61,.15);}

  .comment-box{background:#f7f9fc;border-left:3px solid var(--blue-accent);border-radius:8px;padding:13px 16px;font-size:13px;color:var(--text);line-height:1.55;margin-top:6px;}
  .comment-box.red{border-left-color:var(--red);background:var(--red-soft);}
  #view-baisses .baisse-analysis .comment-box{background:transparent;border:0;border-radius:0;padding:4px 0 0;margin:0;font-style:normal;font-weight:400;}

  /* ---------- Motion & interaction ---------- */
  @keyframes view-enter{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes detail-enter{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
  @keyframes progress-fill{from{transform:scaleX(0)}to{transform:scaleX(1)}}
  .view.active{animation:view-enter .32s cubic-bezier(.2,.8,.2,1) both;}
  .md-detail{animation:detail-enter .28s cubic-bezier(.2,.8,.2,1) both;}
  .card,.panel,.md-sidebar,.kpi-card2,.contrib-accordion,.pc-table-wrap{transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease;}
  .card:hover,.panel:hover,.md-sidebar:hover,.contrib-accordion:hover,.pc-table-wrap:hover{border-color:#d2d6df;box-shadow:0 10px 28px rgba(19,25,39,.10);}
  .kpi-card2:hover{transform:translateY(-3px);border-color:#b9c8dd;box-shadow:0 12px 24px rgba(0,37,98,.12);}
  tbody tr{transition:background-color .15s ease,transform .15s ease;}
  tbody tr:hover{background:#f7f8ff;}
  .md-item:hover{transform:translateX(3px);box-shadow:0 4px 12px rgba(0,37,98,.08);}
  .md-item:active,.tab:active,.page-btn:active,.pc-period-button:active,.pc-back-button:active{transform:scale(.98);}
  .page-btn,.pc-period-button,.pc-back-button,.pill-toggle button{transition:transform .15s ease,background-color .15s ease,color .15s ease,border-color .15s ease,box-shadow .15s ease;}
  .page-btn:not(.active):not(:disabled):hover,.pc-period-button:not(.active):hover{border-color:var(--blue-accent);color:var(--blue-accent);background:var(--blue-soft);transform:translateY(-1px);}
  .contrib-accordion summary{transition:background-color .18s ease,color .18s ease;}
  .contrib-accordion summary:hover{background:var(--blue-soft);color:var(--blue-accent);}
  .contrib-accordion[open] .contrib-accordion-content{animation:view-enter .24s ease both;}
  .contrib-accordion[open] .rank-bar{transform-origin:left center;animation:progress-fill .9s cubic-bezier(.22,1,.36,1) var(--bar-delay,0ms) both;}
  @media(prefers-reduced-motion:reduce){
    *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important;}
  }

  .pagination{display:flex;gap:6px;justify-content:center;margin-top:14px;align-items:center;}
  .page-btn{border:1px solid var(--border);background:#fff;border-radius:var(--radius-sm);min-width:32px;height:32px;font-size:12px;font-weight:600;cursor:pointer;padding:0 7px;}
  .page-btn.active{background:var(--blue-accent);color:#fff;border-color:var(--blue-accent);}
  .page-btn:disabled{opacity:.35;cursor:default;}
  .page-jump{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:11px;color:var(--muted);white-space:nowrap;}
  .page-select{height:32px;min-width:68px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;color:var(--text);padding:0 26px 0 10px;font:600 12px Inter,sans-serif;cursor:pointer;outline:none;transition:border-color .15s ease,box-shadow .15s ease;}
  .page-select:hover,.page-select:focus{border-color:var(--blue-accent);box-shadow:0 0 0 3px var(--blue-soft);}
  .page-info{font-size:11px;color:var(--text-muted);margin:0 6px;}

  .mini-tag{display:inline-flex;align-items:center;gap:5px;background:#eef1f7;border-radius:7px;padding:3px 8px;font-size:11px;font-weight:600;color:var(--navy);}
  .mini-tag .dot{width:6px;height:6px;border-radius:50%;background:var(--blue-accent);}

  /* ---------- Performance CA par commerciale ---------- */
  .contrib-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;}
  .contrib-hero{padding:22px 22px 18px;background:linear-gradient(135deg,#fff 0%,#f7fbfe 100%);}
  .contrib-heading{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px;}
  .contrib-heading .subtitle{margin:3px 0 0;}
  .contrib-period{display:inline-flex;align-items:center;gap:7px;padding:7px 11px;border-radius:999px;background:var(--blue-soft);color:var(--blue-accent);font-size:11px;font-weight:800;white-space:nowrap;}
  .contrib-period::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--blue-accent);}
  .contrib-section{border:1px solid var(--border);border-radius:12px;padding:0;background:#fff;overflow:hidden;}
  .contrib-section-head{display:flex;align-items:center;gap:10px;padding:15px 17px;border-bottom:1px solid var(--border);}
  .contrib-section-head h3{margin:0;font-size:14px;line-height:20px;font-weight:800;}
  .trend-mark{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:8px;font-size:14px;font-weight:900;}
  .contrib-section.up .trend-mark{background:var(--green-soft);color:var(--green);}
  .contrib-section.down .trend-mark{background:var(--red-soft);color:var(--red);}
  .contrib-table-wrap{overflow-x:visible;}
  .contrib-table{width:100%;table-layout:fixed;}
  .contrib-table th{padding:10px 8px;background:#f8fafc;font-size:9px;text-transform:uppercase;letter-spacing:.2px;white-space:nowrap;}
  .contrib-table td{padding:12px 8px;}
  .contrib-table th:first-child,.contrib-table td:first-child{width:30%;}
  .contrib-table th:not(:first-child),.contrib-table td:not(:first-child){width:17.5%;}
  .contrib-table.top5 th:first-child,.contrib-table.top5 td:first-child{width:34%;}
  .contrib-table.top5 th:not(:first-child),.contrib-table.top5 td:not(:first-child){width:22%;}
  .contrib-table tbody tr{animation:view-enter .32s ease var(--row-delay,0ms) both;}
  .commercial-name{font-weight:700;}
  .contrib-rank{display:inline-flex;align-items:center;justify-content:center;width:25px;height:25px;margin-right:9px;border-radius:8px;background:var(--blue-soft);color:var(--blue-accent);font-size:11px;font-weight:800;}
  .delta-cell{font-weight:800;white-space:nowrap;}
  .delta-cell.pos{color:var(--green);}
  .delta-cell.neg{color:var(--red);}
  .contrib-accordion{border:1px solid var(--border);border-radius:12px;background:#fff;overflow:hidden;}
  .contrib-accordion summary{display:flex;align-items:center;justify-content:space-between;gap:14px;list-style:none;padding:16px 18px;cursor:pointer;font-size:13px;font-weight:800;user-select:none;}
  .contrib-accordion summary::-webkit-details-marker{display:none;}
  .contrib-accordion summary::after{content:'+';width:24px;height:24px;border-radius:7px;background:#f2f4f7;color:var(--navy);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:600;flex:0 0 24px;}
  .contrib-accordion[open] summary::after{content:'−';background:var(--blue-soft);color:var(--blue-accent);}
  .contrib-accordion[open] summary{border-bottom:1px solid var(--border);}
  .contrib-accordion-content{padding:4px 18px 10px;}
  .contrib-col-head{font-size:13px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
  .rank-row{display:flex;align-items:center;gap:12px;padding:9px 4px;border-bottom:1px solid #f1f2f6;}
  .rank-row:last-child{border-bottom:none;}
  .rank-num{width:20px;color:var(--text-muted);font-weight:700;font-size:12px;flex-shrink:0;}
  .rank-name{flex:1;min-width:0;font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .rank-bar-wrap{background:#eef1f7;border-radius:6px;height:7px;width:min(260px,24vw);overflow:hidden;flex-shrink:0;}
  .rank-bar{height:100%;border-radius:6px;}
  .rank-val{font-weight:800;font-size:12.5px;width:78px;text-align:right;flex-shrink:0;}
  .rank-pct{font-weight:700;font-size:11.5px;width:52px;text-align:right;flex-shrink:0;}

  @media(max-width:1000px){
    .app-layout{grid-template-columns:82px minmax(0,1fr);}
    .sidebar{padding:14px 10px;}
    .sidebar-brand{justify-content:center;padding:2px 0 16px;}
    .sidebar-logo{width:48px;height:42px;object-position:center;}
    .sidebar-brand .brand,.sidebar-label,.tab-label{display:none;}
    .tab{justify-content:center;padding:12px 8px;}
    .tab:hover{transform:none;}
    .tab.active{box-shadow:inset 3px 0 0 var(--blue-accent);}
    .kpi-cards-row{grid-template-columns:1fr 1fr;}
    .master-detail{flex-direction:column;}
    .md-sidebar,.compare-sidebar{width:100%;}
    #view-top-affaires .md-sidebar,
    #view-baisses .md-sidebar,
    #view-detail-affaires .md-sidebar{width:100%;flex:0 0 auto;}
    .contrib-grid{grid-template-columns:1fr;}
    .top-share-list{grid-template-columns:repeat(2,minmax(150px,1fr));}
    .top-share-card:nth-child(odd){border-left:0;}
    .top-share-card:nth-child(n+3){border-top:1px solid var(--border);}
  }
  @media(max-width:620px){
    .app-layout{grid-template-columns:66px minmax(0,1fr);}
    .sidebar{padding:12px 7px;}
    .brand-mark{width:32px;height:32px;}
    .container{padding:20px 14px 48px;}
    .kpi-cards-row,.md-filters{grid-template-columns:1fr;}
    .compare-item-grid{grid-template-columns:1fr 1fr;}
    .pc-card-grid{grid-template-columns:1fr 1fr;}
    .pc-toolbar{grid-template-columns:1fr;}
    .rank-bar-wrap{width:70px;}
    .contrib-heading{flex-direction:column;}
    .dashboard-header{align-items:flex-start;flex-direction:column;gap:8px;}
    .top-share-list{grid-template-columns:1fr;}
    .top-share-card+.top-share-card{border-left:0;border-top:1px solid var(--border);}
  }
</style>
</head>
<body>

<script>window.__DATA_PARTS=[];</script>

<script>
const DATA = JSON.parse(window.__DATA_PARTS.join(''));
window.__DATA_PARTS = null;
function fmt(n){ return Math.round(n).toLocaleString('fr-FR'); }
function fmtSigned(n){ return (n>=0?'+':'') + Math.round(n).toLocaleString('fr-FR'); }
function fmtEuro(n){ return n.toLocaleString('fr-FR',{maximumFractionDigits:0}); }
function initials(name){
  return name.split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();
}
function esc(s){ return (s||'').replace(/"/g,'&quot;'); }
function pctChange(current, previous){
  return previous!==0 ? ((current-previous)/Math.abs(previous))*100 : null;
}
function fmtPct(current, previous){
  const pct = pctChange(current, previous);
  return pct===null ? (current!==0?'Nouveau':'—') : `${pct>=0?'+':''}${pct.toFixed(1).replace('.',',')}%`;
}
function trendState(current, previous){
  if(previous===0 && current!==0) return 'new';
  if(current===0 && previous!==0) return 'inactive';
  if(current>previous) return 'up';
  if(current<previous) return 'down';
  return 'stable';
}
function trendTag(current, previous){
  const state = trendState(current, previous);
  if(state==='new') return '<span class="tag new">Nouveau 2026</span>';
  if(state==='inactive') return '<span class="tag neutral">Inactif 2026</span>';
  if(state==='up') return '<span class="tag up">▲ hausse</span>';
  if(state==='down') return '<span class="tag down">▼ baisse</span>';
  return '<span class="tag neutral">Stable</span>';
}
function dateKey(value){
  const p=(value||'').split('/');
  return p.length===3 ? `${p[2]}-${p[1]}-${p[0]}` : (value||'');
}
function renderInvoiceRows(rows){
  return rows.map(t=>`<tr>
    <td>${t[6]||'—'}</td>
    <td>${t[7]||'—'}</td>
    <td>${t[4]||'—'}</td>
    <td>${t[5]||'—'}</td>
    <td>${t[1]||'—'}</td>
    <td class="num" style="font-weight:700;">${fmtEuro(t[3])} €</td>
    <td>${t[8]||'—'}</td>
    <td>${t[9]||'—'}</td>
    <td>${t[0]||'—'}</td>
    <td>${t[2]||'—'}</td>
  </tr>`).join('');
}
const invoiceFieldConfig={
  logiciel:{index:6,type:'text'},pays:{index:7,type:'text'},datefac:{index:4,type:'date'},numfac:{index:5,type:'text'},
  affaire:{index:1,type:'text'},montant:{index:3,type:'number'},dateloc:{index:8,type:'date'},datefin:{index:9,type:'date'},
  client:{index:0,type:'text'},commercial:{index:2,type:'text'},
};
function sortInvoices(rows,field='datefac',dir='desc'){
  const config=invoiceFieldConfig[field]||invoiceFieldConfig.datefac,direction=dir==='asc'?1:-1;
  return rows.slice().sort((a,b)=>{
    let av=a[config.index]??'',bv=b[config.index]??'';
    if(config.type==='number')return ((Number(av)||0)-(Number(bv)||0))*direction;
    if(config.type==='date'){av=dateKey(av);bv=dateKey(bv);}
    return String(av).localeCompare(String(bv),'fr',{numeric:true,sensitivity:'base'})*direction;
  });
}
function invoiceSortHeader(field,label,sortField,sortDir){
  const active=field===sortField;
  return `<button class="sortable-header invoice-sort ${active?'active':''}" data-invoice-field="${field}" type="button">${label}<span class="sort-icon">${active?(sortDir==='asc'?'▲':'▼'):'⇅'}</span></button>`;
}
function invoiceTable(rows, emptyMessage='Aucune facture pour cette période.',sortField='datefac',sortDir='desc'){
  return `<table class="invoice-table"><thead><tr>
    <th>${invoiceSortHeader('logiciel','Logiciel',sortField,sortDir)}</th><th>${invoiceSortHeader('pays','Pays',sortField,sortDir)}</th><th>${invoiceSortHeader('datefac','Datefac',sortField,sortDir)}</th><th>${invoiceSortHeader('numfac','Numfac',sortField,sortDir)}</th><th>${invoiceSortHeader('affaire','Affaire',sortField,sortDir)}</th><th class="num">${invoiceSortHeader('montant','Mttventil',sortField,sortDir)}</th><th>${invoiceSortHeader('dateloc','Dateloc',sortField,sortDir)}</th><th>${invoiceSortHeader('datefin','Datefin',sortField,sortDir)}</th><th>${invoiceSortHeader('client','Nom du client modifié',sortField,sortDir)}</th><th>${invoiceSortHeader('commercial','Nom du commercial modifié',sortField,sortDir)}</th>
  </tr></thead><tbody>${renderInvoiceRows(rows)||`<tr><td colspan="10" class="empty-state">${emptyMessage}</td></tr>`}</tbody></table>`;
}
function nextInvoiceSort(field,currentField,currentDir){
  return {field,dir:field===currentField&&currentDir==='desc'?'asc':'desc'};
}
function refocusSearch(id,position){
  const input=document.getElementById(id);
  if(!input)return;
  input.focus();
  if(typeof input.setSelectionRange==='function')input.setSelectionRange(position,position);
}

/* ================= TAB SWITCHING ================= */
document.querySelectorAll('#tabs .tab').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('#tabs .tab').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('view-'+btn.dataset.view).classList.add('active');
  });
});

/* ================= GENERIC PAGINATION HELPER ================= */
function paginate(list, page, perPage){
  const totalPages = Math.max(1, Math.ceil(list.length/perPage));
  page = Math.min(Math.max(1,page), totalPages);
  const slice = list.slice((page-1)*perPage, page*perPage);
  return {slice, page, totalPages, total:list.length};
}
function renderPagination(containerId, page, totalPages, onPage){
  const el = document.getElementById(containerId);
  if(!el) return;
  if(totalPages<=1){ el.innerHTML=''; return; }
  let btns = '';
  const maxShow = 5;
  let start = Math.max(1, page-2), end = Math.min(totalPages, start+maxShow-1);
  start = Math.max(1, end-maxShow+1);
  btns += `<button class="page-btn" data-p="${page-1}" ${page===1?'disabled':''} aria-label="Page précédente" title="Page précédente">‹</button>`;
  for(let p=start;p<=end;p++){
    btns += `<button class="page-btn ${p===page?'active':''}" data-p="${p}">${p}</button>`;
  }
  btns += `<button class="page-btn" data-p="${page+1}" ${page===totalPages?'disabled':''} aria-label="Page suivante" title="Page suivante">›</button>`;
  btns += `<span class="page-info">${totalPages} pages</span>`;
  btns += `<label class="page-jump">Aller à la page <select class="page-select" aria-label="Aller à la page">${Array.from({length:totalPages},(_,i)=>`<option value="${i+1}" ${i+1===page?'selected':''}>${i+1}</option>`).join('')}</select></label>`;
  el.innerHTML = btns;
  el.querySelectorAll('.page-btn').forEach(b=>{
    b.addEventListener('click', ()=> onPage(parseInt(b.dataset.p)));
  });
  el.querySelector('.page-select')?.addEventListener('change',e=>onPage(parseInt(e.target.value)));
}

/* ================= 1. TOP AFFAIRES (master-detail) ================= */
let topAffaireSelected = DATA.affaires_detail[0]?.name;
function renderTopAffairesSidebar(){
  const list = DATA.affaires_detail;
  return `<div class="md-sidebar">
    <div class="md-sidebar-head"><h3>Top 10 affaires</h3><span class="md-count">${list.length}</span></div>
    <div class="md-list no-scroll-list">
      ${list.map(a=>{
        const tag = a.v2025===0 ? '<span class="tag new">Nouvelle affaire</span>' : '';
        return `<div class="md-item ${a.name===topAffaireSelected?'active':''}" data-name="${esc(a.name)}">
          <div><div class="name">${a.rank} ${a.name}</div></div>
          ${tag}
        </div>`;
      }).join('')}
    </div>
  </div>`;
}
function renderTopAffaireDetail(name){
  const a = DATA.affaires_detail.find(x=>x.name===name);
  if(!a) return '';
  const diff = a.v2026-a.v2025;
  const evo = a.v2025>0 ? ((diff)/a.v2025*100) : null;
  const totalComm = a.commercial.reduce((s,c)=>s+c[1],0)||1;
  return `<div class="md-detail">
    <div class="detail-header">
      <div class="avatar-circle">${a.rank}</div>
      <div class="detail-title-wrap">
        <div class="detail-title">${a.name}</div>
      </div>
    </div>
    <div class="kpi-cards-row">
      <div class="kpi-card2"><div class="lbl">CA 2026</div><div class="val">${fmt(a.v2026)} k€</div></div>
      <div class="kpi-card2"><div class="lbl">CA 2025</div><div class="val">${fmt(a.v2025)} k€</div></div>
      <div class="kpi-card2"><div class="lbl">Δ Valeur</div><div class="val ${diff>=0?'pos':'neg'}">${diff>=0?'▲':'▼'} ${fmtSigned(diff)} k€</div><span class="delta-pct ${diff>=0?'pos':'neg'}">${evo!==null?(evo>=0?'+':'')+evo.toFixed(0)+'%':'—'}</span></div>
      <div class="kpi-card2"><div class="lbl">Budget</div><div class="val">&nbsp;</div></div>
    </div>
    <div class="panel">
      <div class="panel-head"><h3>Comparatif par commercial</h3></div>
      <table>
        <thead><tr><th>Commercial</th><th class="num">CA 2026</th><th class="num">CA 2025</th><th class="num">Δ Valeur</th><th class="num">Δ % (2026 - CA 2025)</th></tr></thead>
        <tbody>
          ${a.commercial.map(c=>{
            const [cname,v26,v25] = c;
            const ecart = v26-v25;
            const deltaPct = v25!==0 ? (ecart/v25*100) : null;
            return `<tr>
              <td><div style="display:flex;align-items:center;gap:8px;"><div class="avatar-circle round" style="width:28px;height:28px;font-size:11px;">${initials(cname)}</div>${cname}</div></td>
              <td class="num" style="font-weight:700;color:var(--blue-accent);">${v26?fmt(v26)+' k€':'–'}</td>
              <td class="num">${v25?fmt(v25)+' k€':'–'}</td>
              <td class="num" style="font-weight:700;color:${ecart>=0?'var(--green)':'var(--red)'};">${fmtSigned(ecart)} k€</td>
              <td class="num" style="font-weight:700;color:${deltaPct===null?'var(--text-muted)':ecart>=0?'var(--green)':'var(--red)'};">${deltaPct===null?'—':`${deltaPct>=0?'+':''}${deltaPct.toFixed(1).replace('.',',')}%`}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    <div class="panel">
      <div class="panel-head"><h3>Répartition du CA 2026 par commercial</h3></div>
      <div class="top-share-list" style="--share-count:${Math.min(a.commercial.length,4)}">
        ${a.commercial.map((c,index)=>{
          const [cname,v26] = c;
          const share = v26/totalComm*100;
          const shareColors = ['#0E5ECF','#1584AE','#862EDA','#11B081'];
          const shareColor = shareColors[index%shareColors.length];
          return `<div class="top-share-card" style="--share-color:${shareColor};--share-delay:${index*65}ms">
            <div class="top-share-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-7 8-7s8 2.6 8 7"/></svg></div>
            <div class="top-share-name">${cname}</div>
            <div class="top-share-value">${v26?fmt(v26)+' k€':'—'}</div>
            <div class="top-share-pct">${share.toFixed(1).replace('.',',')} %</div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
}
function renderTopAffairesView(){
  const el = document.getElementById('view-top-affaires');
  el.innerHTML = `<div class="master-detail">
      ${renderTopAffairesSidebar()}
      ${renderTopAffaireDetail(topAffaireSelected)}
    </div>`;
  el.querySelectorAll('.md-item').forEach(item=>{
    item.addEventListener('click', ()=>{ topAffaireSelected = item.dataset.name; renderTopAffairesView(); });
  });
}

/* ================= 2. BAISSES DE CA (master-detail) ================= */
let baisseSelectedIdx = 0;
function renderBaissesSidebar(){
  return `<div class="md-sidebar">
    <div class="md-sidebar-head"><h3>Clients en baisse</h3><span class="md-count">${DATA.baisses.length}</span></div>
    <div class="md-list no-scroll-list">
      ${DATA.baisses.map((b,i)=>{
        const title = b.label.replace(/^\d+\.\s*/, '').replace(/\s*:\s*baisse.*$/i,'');
        return `<div class="md-item ${i===baisseSelectedIdx?'active':''}" data-i="${i}">
          <div><div class="name">${title}</div></div>
          <span class="tag down">${fmtSigned(b.ecart)} k€</span>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}
function renderBaisseDetail(i){
  const b = DATA.baisses[i];
  const title = b.label.replace(/^\d+\.\s*/, '').replace(/\s*:\s*baisse.*$/i,'');
  const pct = b.m2025>0 ? (b.ecart/b.m2025*100) : null;
  return `<div class="md-detail baisse-detail">
    <div class="detail-header">
      <div class="detail-title-wrap">
        <div class="detail-title">${title}</div>
      </div>

function aggregateCompare(txs26, txs25, keyIdx){
  const map={};
  txs26.forEach(t=>{
    const key=t[keyIdx]||'—';
    if(!map[key]) map[key]={key,v26:0,v25:0,count26:0,count25:0};
    map[key].v26+=t[3]; map[key].count26++;
  });
  txs25.forEach(t=>{
    const key=t[keyIdx]||'—';
    if(!map[key]) map[key]={key,v26:0,v25:0,count26:0,count25:0};
    map[key].v25+=t[3]; map[key].count25++;

        <option value="inactive" ${dcTrend==='inactive'?'selected':''}>Inactifs en 2026</option>
      </select>
    </div>
    <div class="pc-table-wrap"><table class="pc-table">
      <thead><tr><th>${dcSortHeader('name','Commercial')}</th><th class="num">${dcSortHeader('v26','CA 2026')}</th><th class="num">${dcSortHeader('v25','CA 2025')}</th><th class="num">${dcSortHeader('diff','Δ Valeur')}</th><th class="num">${dcSortHeader('pct','Δ %')}</th></tr></thead>
      <tbody>${pag.slice.map(n=>{
        const t26 = commTotal(n, commIdx2026), t25 = commTotal(n, commIdx2025);
        const diff=t26-t25;
        return `<tr><td class="client-cell"><div class="pc-client-meta"><span>${n}</span></div></td>
          <td class="num"><button class="dc-ca-link pc-ca-link" data-name="${esc(n)}" data-period="2026" type="button" aria-label="Voir les factures 2026 de ${esc(n)}">${fmtEuro(t26)} €</button></td>
          <td class="num"><button class="dc-ca-link pc-ca-link" data-name="${esc(n)}" data-period="2025" type="button" aria-label="Voir les factures 2025 de ${esc(n)}">${fmtEuro(t25)} €</button></td>
          <td class="num" style="font-weight:700;color:${diff>=0?'var(--green)':'var(--red)'};">${fmtSigned(diff)} €</td>
          <td class="num" style="font-weight:700;color:${diff>=0?'var(--green)':'var(--red)'};">${fmtPct(t26,t25)}</td></tr>`;
      }).join('') || '<tr><td colspan="5" class="empty-state">Aucun commercial ne correspond aux filtres.</td></tr>'}</tbody>
    </table></div><div class="pagination" id="dcListPagination"></div>
  </div>`;
}
function aggregateBy(txs, keyIdx){
  const map = {};
  txs.forEach(t=>{
    const k = t[keyIdx] || '—';
    if(!map[k]) map[k] = {key:k, total:0, count:0, lastDate:''};
    map[k].total += t[3];
    map[k].count += 1;
    if(!map[k].lastDate || dateKey(t[4]) > dateKey(map[k].lastDate)) map[k].lastDate = t[4];
  });
  return Object.values(map).sort((a,b)=>b.total-a.total);
}
function renderDCLegacyDetail(){
  const txs26 = commIdx2026[dcSelected]||[];
  const txs25 = commIdx2025[dcSelected]||[];
  const t26 = txs26.reduce((s,t)=>s+t[3],0);
  const t25 = txs25.reduce((s,t)=>s+t[3],0);
  const tdiff = t26-t25;
  const affairesSet26 = new Set(txs26.map(t=>t[1]));
  const clientsSet26 = new Set(txs26.map(t=>t[0]));

  const affTxs = dcAffairesPeriod==='2026'?txs26:txs25;
  const cliTxs = dcClientsPeriod==='2026'?txs26:txs25;
  const affAgg = aggregateBy(affTxs, 1);
  const cliAgg = aggregateBy(cliTxs, 0);
  const affPag = paginate(affAgg, dcAffairesPage, DC_PER_PAGE);
  const cliPag = paginate(cliAgg, dcClientsPage, DC_PER_PAGE);
  const invoiceTxs=sortInvoices(dcTxPeriod==='2026'?txs26:txs25,dcInvoiceSortField,dcInvoiceSortDir);
  const invoicePag=paginate(invoiceTxs,dcTxPage,DC_TX_PER_PAGE);

  return `<div class="md-detail">
    <button class="pc-back-button" id="dcBackButton" type="button">← Retour à la performance commerciaux</button>
    <div class="detail-header">
      <div class="avatar-circle round">${initials(dcSelected||'?')}</div>
      <div class="detail-title-wrap">
        <div class="detail-title">${dcSelected||'—'}</div>
        <div class="detail-sub">Commercial LENI Event Tech • ${affairesSet26.size} affaire(s) • ${clientsSet26.size} client(s) en 2026</div>
      </div>
    </div>
    <div class="kpi-cards-row">
      <div class="kpi-card2"><div class="lbl">CA 2026</div><div class="val">${fmtEuro(t26)} €</div></div>
      <div class="kpi-card2"><div class="lbl">CA 2025</div><div class="val">${fmtEuro(t25)} €</div></div>
      <div class="kpi-card2"><div class="lbl">Δ Valeur</div><div class="val ${tdiff>=0?'pos':'neg'}">${fmtSigned(tdiff)} €</div></div>
      <div class="kpi-card2"><div class="lbl">Δ %</div><div class="val ${tdiff>=0?'pos':'neg'}">${fmtPct(t26,t25)}</div></div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <h3>Détail des factures</h3>
        <div class="pill-toggle" id="dcTxToggle">
          <button data-p="2025" class="${dcTxPeriod==='2025'?'active':''}">2025</button>
          <button data-p="2026" class="${dcTxPeriod==='2026'?'active':''}">2026</button>
        </div>
      </div>
      <div class="subtitle">${invoiceTxs.length} ligne(s) • ${fmtEuro(invoiceTxs.reduce((s,t)=>s+t[3],0))} €</div>
      ${invoiceTable(invoicePag.slice,'Aucune facture pour cette période.',dcInvoiceSortField,dcInvoiceSortDir)}
      <div class="pagination" id="dcTxPagination"></div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <h3>Affaires travaillées</h3>
        <div class="pill-toggle" id="dcAffToggle">
          <button data-p="2025" class="${dcAffairesPeriod==='2025'?'active':''}">2025</button>
          <button data-p="2026" class="${dcAffairesPeriod==='2026'?'active':''}">2026</button>
        </div>
      </div>
      <div class="subtitle">Total ${dcAffairesPeriod} : ${fmt(affAgg.reduce((s,a)=>s+a.total,0)/1000)} k€ • ${affAgg.length} affaires</div>
      <table>
        <thead><tr><th>Affaire</th><th>Dernière facture</th><th class="num">Factures</th><th class="num">CA</th></tr></thead>
        <tbody>
          ${affPag.slice.map(a=>`<tr>
            <td>${a.key||'—'}</td><td>${a.lastDate||'—'}</td>
            <td class="num">${a.count}</td>
            <td class="num" style="font-weight:700;color:var(--blue-accent);">${fmtEuro(a.total)} €</td>
          </tr>`).join('') || '<tr><td colspan="4" style="color:var(--text-muted);text-align:center;">Aucune donnée pour cette période</td></tr>'}
        </tbody>
      </table>
      <div class="pagination" id="dcAffPagination"></div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <h3>Clients en portefeuille</h3>
        <div class="pill-toggle" id="dcCliToggle">
          <button data-p="2025" class="${dcClientsPeriod==='2025'?'active':''}">2025</button>
          <button data-p="2026" class="${dcClientsPeriod==='2026'?'active':''}">2026</button>
        </div>
      </div>
      <div class="subtitle">Total ${dcClientsPeriod} : ${fmt(cliAgg.reduce((s,a)=>s+a.total,0)/1000)} k€ • ${cliAgg.length} clients</div>
      <table>
        <thead><tr><th>Client</th><th>Dernière facture</th><th class="num">Factures</th><th class="num">CA</th></tr></thead>
        <tbody>
          ${cliPag.slice.map(c=>`<tr>
            <td>${c.key||'—'}</td><td>${c.lastDate||'—'}</td>
            <td class="num">${c.count}</td>
            <td class="num" style="font-weight:700;">${fmtEuro(c.total)} €</td>
          </tr>`).join('') || '<tr><td colspan="4" style="color:var(--text-muted);text-align:center;">Aucune donnée pour cette période</td></tr>'}
        </tbody>
      </table>
      <div class="pagination" id="dcCliPagination"></div>
    </div>
  </div>`;
}
function renderDCDetail(){
  const txs26=commIdx2026[dcSelected]||[];
  const txs25=commIdx2025[dcSelected]||[];
  const t26=commTotal(dcSelected,commIdx2026),t25=commTotal(dcSelected,commIdx2025),diff=t26-t25;
  const invoiceTxs=sortInvoices(dcTxPeriod==='2026'?txs26:txs25,dcInvoiceSortField,dcInvoiceSortDir);
  const invoicePag=paginate(invoiceTxs,dcTxPage,DC_TX_PER_PAGE);
  const selectedTotal=invoiceTxs.reduce((sum,t)=>sum+t[3],0);
  return `<div class="md-detail">
    <button class="pc-back-button" id="dcBackButton" type="button">← Retour à la performance commerciaux</button>
    <div class="detail-header">
      <div class="avatar-circle round">${initials(dcSelected||'?')}</div>
      <div class="detail-title-wrap"><div class="detail-title">${dcSelected||'—'}</div><div class="detail-sub">Factures composant le CA ${dcTxPeriod} • ${invoiceTxs.length} ligne(s)</div></div>
      <div class="pc-period-switch" id="dcTxToggle">
        <button class="pc-period-button ${dcTxPeriod==='2026'?'active':''}" data-p="2026" type="button">CA 2026 · ${fmtEuro(t26)} €</button>
        <button class="pc-period-button ${dcTxPeriod==='2025'?'active':''}" data-p="2025" type="button">CA 2025 · ${fmtEuro(t25)} €</button>
      </div>
    </div>
    <div class="kpi-cards-row">
      <div class="kpi-card2 ${dcTxPeriod==='2026'?'selected-period':''}"><div class="lbl">CA 2026</div><div class="val">${fmtEuro(t26)} €</div></div>
      <div class="kpi-card2 ${dcTxPeriod==='2025'?'selected-period':''}"><div class="lbl">CA 2025</div><div class="val">${fmtEuro(t25)} €</div></div>
      <div class="kpi-card2"><div class="lbl">Δ Valeur</div><div class="val ${diff>=0?'pos':'neg'}">${fmtSigned(diff)} €</div></div>
      <div class="kpi-card2"><div class="lbl">Δ %</div><div class="val ${diff>=0?'pos':'neg'}">${fmtPct(t26,t25)}</div></div>
    </div>
    <div class="panel">
      <div class="panel-head">
        <div><h3>Détail des factures du CA ${dcTxPeriod}</h3><div class="subtitle">${invoiceTxs.length} ligne(s) de facturation • Total : ${fmtEuro(selectedTotal)} €</div></div>
        <span class="tag new">Période sélectionnée : ${dcTxPeriod}</span>
      </div>
      ${invoiceTable(invoicePag.slice,'Aucune facture pour cette période.',dcInvoiceSortField,dcInvoiceSortDir)}
      <div class="pagination" id="dcTxPagination"></div>
    </div>
  </div>`;
}
function renderDCView(){
  const el = document.getElementById('view-detail-commerciaux');
  if(dcMode==='list'){
    el.innerHTML=renderDCSidebar();
    el.querySelectorAll('.dc-ca-link').forEach(button=>button.addEventListener('click',()=>{
      dcSelected=button.dataset.name;
      dcTxPeriod=button.dataset.period;
      dcTxPage=1;
      dcMode='detail';
      renderDCView();
    }));
    const search=document.getElementById('dcSearchInput');
    search.addEventListener('input',()=>{const position=search.selectionStart;dcSearch=search.value;dcListPage=1;renderDCView();refocusSearch('dcSearchInput',position);});
    document.getElementById('dcTrendSelect').addEventListener('change',e=>{dcTrend=e.target.value;dcListPage=1;renderDCView();});
    el.querySelectorAll('[data-dc-sort-field]').forEach(button=>button.addEventListener('click',()=>{setDCSort(button.dataset.dcSortField);renderDCView();}));
    const filteredCommercials=getFilteredCommercials();
    renderPagination('dcListPagination',dcListPage,Math.max(1,Math.ceil(filteredCommercials.length/DC_LIST_PER_PAGE)),p=>{dcListPage=p;renderDCView();});
    return;
  }
  el.innerHTML=renderDCDetail();
  document.getElementById('dcBackButton').addEventListener('click',()=>{dcMode='list';renderDCView();});
  document.querySelectorAll('#dcTxToggle button').forEach(b=>{
    b.addEventListener('click', ()=>{ dcTxPeriod=b.dataset.p; dcTxPage=1; renderDCView(); });
  });
  el.querySelectorAll('.invoice-sort').forEach(button=>button.addEventListener('click',()=>{const next=nextInvoiceSort(button.dataset.invoiceField,dcInvoiceSortField,dcInvoiceSortDir);dcInvoiceSortField=next.field;dcInvoiceSortDir=next.dir;dcTxPage=1;renderDCView();}));
  const invoiceTxs=dcTxPeriod==='2026'?(commIdx2026[dcSelected]||[]):(commIdx2025[dcSelected]||[]);
  renderPagination('dcTxPagination',dcTxPage,Math.max(1,Math.ceil(invoiceTxs.length/DC_TX_PER_PAGE)),p=>{dcTxPage=p;renderDCView();});
}
